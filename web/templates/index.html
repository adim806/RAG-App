<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevMind — Internal Knowledge Base</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">DevMind</span>
    </div>
    <button class="btn-new-chat" id="btnNewChat" title="New conversation">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-section-label">Recent</div>
  <nav class="session-list" id="sessionList">
    <!-- sessions injected by JS -->
  </nav>

  <div class="sidebar-footer">
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </div>
</aside>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<main class="main" id="main">

  <!-- Top bar -->
  <header class="topbar">
    <button class="btn-icon btn-toggle-sidebar" id="btnToggleSidebar" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="topbar-title" id="topbarTitle">New conversation</span>
    <div class="topbar-actions">
      <button class="btn-icon" id="btnDeleteSession" title="Delete conversation" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Loading overlay shown while engine initialises -->
  <div class="init-overlay" id="initOverlay">
    <div class="init-card">
      <div class="init-logo">⬡</div>
      <h2 class="init-title">DevMind</h2>
      <p class="init-sub">Internal Knowledge Base</p>
      <div class="init-spinner"></div>
      <p class="init-status" id="initStatus">Loading knowledge base…</p>
      <div class="init-progress-bar"><div class="init-progress-fill" id="initProgressFill"></div></div>
    </div>
  </div>

  <!-- Chat messages area -->
  <div class="chat-area" id="chatArea">
    <!-- Welcome screen shown when no session is active -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⬡</div>
      <h1 class="welcome-title">Welcome to DevMind</h1>
      <p class="welcome-sub">Ask anything about our coding standards, Git workflow,<br>API guidelines, testing policy, architecture, or onboarding.</p>
      <div class="suggestion-grid">
        <button class="suggestion-chip" data-q="What are the Python naming conventions?">Python naming conventions</button>
        <button class="suggestion-chip" data-q="How do I name my Git branches?">Git branch naming</button>
        <button class="suggestion-chip" data-q="What HTTP status codes should I use for validation errors?">API error codes</button>
        <button class="suggestion-chip" data-q="What is the minimum required test coverage?">Test coverage rules</button>
        <button class="suggestion-chip" data-q="How do I set up my local development environment?">Local dev setup</button>
        <button class="suggestion-chip" data-q="What databases does the platform use?">Platform databases</button>
      </div>
    </div>

    <!-- Messages injected here -->
    <div class="message-list" id="messageList" style="display:none;"></div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrapper">
      <textarea
        id="questionInput"
        class="question-input"
        placeholder="Ask about coding standards, Git workflow, architecture…"
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="btn-send" id="btnSend" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">DevMind answers from internal documentation only.</p>
  </div>

</main>

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
/* ---------------------------------------------------------------
   STATE
--------------------------------------------------------------- */
let currentSessionId = null;
let engineReady = false;
let statusPollTimer = null;

/* ---------------------------------------------------------------
   DOM REFS
--------------------------------------------------------------- */
const sidebar       = document.getElementById('sidebar');
const sessionList   = document.getElementById('sessionList');
const chatArea      = document.getElementById('chatArea');
const welcome       = document.getElementById('welcome');
const messageList   = document.getElementById('messageList');
const questionInput = document.getElementById('questionInput');
const btnSend       = document.getElementById('btnSend');
const btnNewChat    = document.getElementById('btnNewChat');
const btnToggle     = document.getElementById('btnToggleSidebar');
const btnDelete     = document.getElementById('btnDeleteSession');
const topbarTitle   = document.getElementById('topbarTitle');
const initOverlay   = document.getElementById('initOverlay');
const initStatus    = document.getElementById('initStatus');
const initFill      = document.getElementById('initProgressFill');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');

/* ---------------------------------------------------------------
   ENGINE STATUS POLLING
--------------------------------------------------------------- */
const STATUS_LABELS = {
  not_initialised:    'Not started',
  downloading_nltk:   'Downloading tokenizer…',
  loading_documents:  'Loading documents…',
  embedding_documents:'Building embeddings…',
  building_index:     'Building search index…',
  ready:              'Ready',
};

async function pollStatus() {
  try {
    const res  = await fetch('/api/status');
    const json = await res.json();
    const d    = json.data;

    const label = STATUS_LABELS[d.status] || d.status;
    initStatus.textContent = label;
    statusText.textContent = label;

    if (d.total > 0) {
      const pct = Math.round((d.progress.current / d.progress.total) * 100);
      initFill.style.width = pct + '%';
    }

    if (d.ready) {
      engineReady = true;
      initOverlay.classList.add('hidden');
      statusDot.className = 'status-dot ready';
      statusText.textContent = `Ready · ${d.vectors} vectors`;
      clearInterval(statusPollTimer);
      await loadSessions();
    } else {
      statusDot.className = 'status-dot loading';
    }
  } catch {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Connection error';
  }
}

statusPollTimer = setInterval(pollStatus, 1500);
pollStatus();

/* ---------------------------------------------------------------
   SESSIONS
--------------------------------------------------------------- */
async function loadSessions() {
  const res  = await fetch('/api/sessions');
  const json = await res.json();
  renderSessionList(json.data || []);
}

function renderSessionList(sessions) {
  sessionList.innerHTML = '';
  if (!sessions.length) {
    sessionList.innerHTML = '<div class="session-empty">No conversations yet.</div>';
    return;
  }
  sessions.forEach(s => {
    const el = document.createElement('button');
    el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    el.dataset.id = s.id;
    el.innerHTML = `
      <span class="session-icon">💬</span>
      <span class="session-title">${escHtml(s.title)}</span>`;
    el.addEventListener('click', () => loadSession(s.id));
    sessionList.appendChild(el);
  });
}

async function loadSession(sessionId) {
  currentSessionId = sessionId;
  btnDelete.style.display = '';

  const res  = await fetch(`/api/sessions/${sessionId}/messages`);
  const json = await res.json();

  showMessageList();
  messageList.innerHTML = '';

  const msgs = json.data || [];
  msgs.forEach(m => appendMessage(m.role, m.content, m.context));

  scrollToBottom();
  await loadSessions();

  const session = await (await fetch(`/api/sessions`)).json();
  const found = (session.data || []).find(s => s.id === sessionId);
  topbarTitle.textContent = found ? found.title : 'Conversation';
}

async function createSession() {
  const res    = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: 'New conversation'}) });
  const json   = await res.json();
  currentSessionId = json.data.id;
  btnDelete.style.display = '';
  topbarTitle.textContent = 'New conversation';
  showMessageList();
  messageList.innerHTML = '';
  await loadSessions();
  return currentSessionId;
}

btnNewChat.addEventListener('click', async () => {
  await createSession();
  questionInput.focus();
});

btnDelete.addEventListener('click', async () => {
  if (!currentSessionId) return;
  if (!confirm('Delete this conversation?')) return;
  await fetch(`/api/sessions/${currentSessionId}`, { method: 'DELETE' });
  currentSessionId = null;
  btnDelete.style.display = 'none';
  topbarTitle.textContent = 'New conversation';
  showWelcome();
  await loadSessions();
});

/* ---------------------------------------------------------------
   CHAT UI HELPERS
--------------------------------------------------------------- */
function showWelcome() {
  welcome.style.display = '';
  messageList.style.display = 'none';
}

function showMessageList() {
  welcome.style.display = 'none';
  messageList.style.display = '';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatMarkdown(text) {
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function appendMessage(role, content, context) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  if (role === 'user') {
    wrap.innerHTML = `
      <div class="msg-bubble user-bubble">${escHtml(content)}</div>`;
  } else {
    const sourceHtml = buildSourceHtml(context);
    wrap.innerHTML = `
      <div class="msg-avatar">⬡</div>
      <div class="msg-body">
        <div class="msg-bubble assistant-bubble">${formatMarkdown(content)}</div>
        ${sourceHtml}
      </div>`;
  }
  messageList.appendChild(wrap);
}

function buildSourceHtml(context) {
  if (!context || !context.length) return '';
  const items = context.map(c => {
    const src = c.source ? c.source.replace('.txt','').replace(/_/g,' ') : 'unknown';
    const pct = Math.round(c.score * 100);
    return `<li><span class="src-label">${escHtml(src)}</span><span class="src-score">${pct}%</span></li>`;
  }).join('');
  return `
    <details class="sources">
      <summary>Sources (${context.length})</summary>
      <ul>${items}</ul>
    </details>`;
}

function appendThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'message assistant thinking-msg';
  wrap.id = 'thinkingBubble';
  wrap.innerHTML = `
    <div class="msg-avatar">⬡</div>
    <div class="msg-body">
      <div class="msg-bubble assistant-bubble thinking">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>`;
  messageList.appendChild(wrap);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingBubble');
  if (el) el.remove();
}

function scrollToBottom() {
  chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
}

/* ---------------------------------------------------------------
   SEND MESSAGE
--------------------------------------------------------------- */
async function sendMessage() {
  const question = questionInput.value.trim();
  if (!question) return;
  if (!engineReady) { alert('The knowledge base is still loading. Please wait.'); return; }

  if (!currentSessionId) {
    await createSession();
  }

  questionInput.value = '';
  autoResizeTextarea();

  appendMessage('user', question, null);
  appendThinking();
  scrollToBottom();
  setInputDisabled(true);

  try {
    const res  = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, session_id: currentSessionId }),
    });
    const json = await res.json();

    removeThinking();

    if (!res.ok) {
      appendMessage('assistant', `⚠ ${json.error?.message || 'Unknown error.'}`, null);
    } else {
      const d = json.data;
      appendMessage('assistant', d.answer, d.context);
      topbarTitle.textContent = await getSessionTitle(currentSessionId);
      await loadSessions();
    }
  } catch (err) {
    removeThinking();
    appendMessage('assistant', `⚠ Network error: ${err.message}`, null);
  } finally {
    setInputDisabled(false);
    scrollToBottom();
    questionInput.focus();
  }
}

async function getSessionTitle(id) {
  const res  = await fetch('/api/sessions');
  const json = await res.json();
  const s    = (json.data || []).find(x => x.id === id);
  return s ? s.title : 'Conversation';
}

function setInputDisabled(disabled) {
  questionInput.disabled = disabled;
  btnSend.disabled = disabled;
  btnSend.classList.toggle('disabled', disabled);
}

/* ---------------------------------------------------------------
   INPUT EVENTS
--------------------------------------------------------------- */
btnSend.addEventListener('click', sendMessage);

questionInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function autoResizeTextarea() {
  questionInput.style.height = 'auto';
  questionInput.style.height = Math.min(questionInput.scrollHeight, 180) + 'px';
}
questionInput.addEventListener('input', autoResizeTextarea);

/* ---------------------------------------------------------------
   SUGGESTION CHIPS
--------------------------------------------------------------- */
document.querySelectorAll('.suggestion-chip').forEach(btn => {
  btn.addEventListener('click', async () => {
    const q = btn.dataset.q;
    if (!engineReady) { alert('The knowledge base is still loading. Please wait.'); return; }
    questionInput.value = q;
    await sendMessage();
  });
});

/* ---------------------------------------------------------------
   SIDEBAR TOGGLE
--------------------------------------------------------------- */
btnToggle.addEventListener('click', () => {
  sidebar.classList.toggle('collapsed');
  document.body.classList.toggle('sidebar-collapsed');
});
</script>
</body>
</html>
